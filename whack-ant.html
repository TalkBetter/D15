<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐜 打螞蟻學單字</title>
<style>
:root {
  --green: #5a9e3a;
  --green-light: #7ec850;
  --brown: #8B6914;
  --brown-dark: #5c4310;
  --sky: #87CEEB;
  --correct: #4CAF50;
  --wrong: #e74c3c;
  --orange: #FF9800;
  --gold: #FFD700;
}

* { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  background: linear-gradient(180deg, var(--sky) 0%, #b5e6f7 40%, var(--green-light) 40%, var(--green) 100%);
  user-select: none;
}

.hidden { display: none !important; }

/* ===== Clouds ===== */
.cloud {
  position: fixed;
  background: white;
  border-radius: 50px;
  opacity: 0.8;
  z-index: 0;
  animation: cloud-drift linear infinite;
}
.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: white;
  border-radius: 50%;
}
.cloud-1 { width: 120px; height: 40px; top: 5%; animation-duration: 35s; }
.cloud-1::before { width: 50px; height: 50px; top: -25px; left: 20px; }
.cloud-1::after { width: 70px; height: 45px; top: -20px; left: 45px; }
.cloud-2 { width: 90px; height: 30px; top: 12%; animation-duration: 45s; animation-delay: -15s; }
.cloud-2::before { width: 40px; height: 40px; top: -20px; left: 15px; }
.cloud-2::after { width: 55px; height: 35px; top: -18px; left: 35px; }
.cloud-3 { width: 100px; height: 35px; top: 8%; animation-duration: 55s; animation-delay: -25s; }
.cloud-3::before { width: 45px; height: 45px; top: -22px; left: 18px; }
.cloud-3::after { width: 60px; height: 38px; top: -16px; left: 40px; }

@keyframes cloud-drift {
  from { left: -200px; }
  to { left: 110vw; }
}

/* ===== Screens ===== */
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

/* ===== Start Screen ===== */
#start-screen { gap: 24px; }

.title {
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 900;
  color: #fff;
  text-shadow: 3px 3px 0 var(--brown-dark), -1px -1px 0 var(--brown-dark);
  text-align: center;
  animation: title-bounce 2s ease-in-out infinite;
}

.title-ant {
  font-size: clamp(3rem, 8vw, 5rem);
  animation: title-wiggle 1.5s ease-in-out infinite;
  display: inline-block;
}

@keyframes title-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

@keyframes title-wiggle {
  0%, 100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

.start-info {
  text-align: center;
  color: rgba(255,255,255,0.85);
  font-size: 1.05rem;
  line-height: 1.8;
}

.start-btn {
  background: linear-gradient(135deg, #ff5252, #ff1744);
  color: white;
  border: 5px solid #b71c1c;
  border-radius: 30px;
  padding: 22px 64px;
  font-size: clamp(1.8rem, 5vw, 2.4rem);
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 8px 0 #7f0000, 0 12px 30px rgba(0,0,0,0.3);
  transition: transform 0.12s, box-shadow 0.12s;
  letter-spacing: 4px;
  animation: btn-glow 1.5s ease-in-out infinite alternate;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

@keyframes btn-glow {
  from { box-shadow: 0 8px 0 #7f0000, 0 12px 30px rgba(255,23,68,0.3); }
  to   { box-shadow: 0 8px 0 #7f0000, 0 12px 40px rgba(255,23,68,0.6); }
}

.start-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 11px 0 #7f0000, 0 16px 40px rgba(255,23,68,0.5);
}

.start-btn:active {
  transform: translateY(4px);
  box-shadow: 0 4px 0 #7f0000;
  animation: none;
}

/* ===== Game Screen ===== */
#game-screen {
  justify-content: flex-start;
  padding-top: 6px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: min(96vw, 640px);
  padding: 5px 14px;
  background: rgba(0,0,0,0.25);
  border-radius: 14px;
  color: white;
  font-size: clamp(0.85rem, 2.5vw, 1.05rem);
  font-weight: 700;
  z-index: 20;
  backdrop-filter: blur(4px);
}

.level-tag {
  background: rgba(255,255,255,0.2);
  padding: 2px 10px;
  border-radius: 8px;
  font-size: 0.85rem;
}

.score-display {
  position: relative;
  min-width: 80px;
}

.score-pop {
  position: absolute;
  left: 70px;
  top: -5px;
  font-size: 1rem;
  font-weight: 900;
  color: var(--gold);
  animation: float-score 0.8s ease-out forwards;
  pointer-events: none;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

@keyframes float-score {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-30px) scale(1.3); }
}

.hearts { letter-spacing: 3px; font-size: 1.3rem; }

.combo-display {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--gold);
  text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  z-index: 30;
  animation: combo-pulse 0.5s ease-in-out infinite alternate;
  pointer-events: none;
}

@keyframes combo-pulse {
  from { transform: translateX(-50%) scale(1); }
  to { transform: translateX(-50%) scale(1.15); }
}

.timer-bar-container {
  width: min(95vw, 600px);
  height: 8px;
  background: rgba(0,0,0,0.2);
  border-radius: 4px;
  margin-top: 8px;
  overflow: hidden;
  z-index: 20;
}

.timer-bar {
  height: 100%;
  background: var(--correct);
  border-radius: 4px;
  transition: width 0.1s linear, background-color 0.3s;
  width: 100%;
}

.prompt-area {
  margin-top: 6px;
  text-align: center;
  z-index: 20;
  min-height: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.prompt-label {
  font-size: clamp(0.8rem, 2.2vw, 1rem);
  color: rgba(255,255,255,0.8);
  margin-bottom: 2px;
}

.prompt-word {
  font-size: clamp(2rem, 6vw, 3.2rem);
  font-weight: 900;
  color: #fff;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
  background: rgba(0,0,0,0.2);
  padding: 4px 24px;
  border-radius: 16px;
}

.replay-btn {
  font-size: 1.3rem;
  background: rgba(255,255,255,0.9);
  border: 3px solid var(--brown);
  border-radius: 14px;
  padding: 10px 28px;
  cursor: pointer;
  font-weight: 700;
  color: var(--brown-dark);
  margin-top: 6px;
  transition: transform 0.1s;
}
.replay-btn:active { transform: scale(0.95); }

/* ===== Holes Grid ===== */
.holes-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px 10px;
  margin-top: 8px;
  width: min(98vw, 680px);
  z-index: 10;
}

.hole {
  position: relative;
  width: clamp(105px, 30vw, 180px);
  height: clamp(120px, 28vw, 180px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.ant-wrapper {
  position: absolute;
  bottom: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translateY(110%);
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  z-index: 1;
  cursor: pointer;
}

.ant-wrapper.show { transform: translateY(0); }
.ant-wrapper.correct-hit { animation: celebrate 0.5s ease-in-out; }
.ant-wrapper.wrong-hit { animation: shake 0.4s ease-in-out; }

.word-sign {
  background: linear-gradient(135deg, #fffdf0, #fff3cc);
  border: 3px solid var(--brown);
  border-radius: 14px;
  padding: 8px 12px;
  font-size: clamp(1.1rem, 3.5vw, 1.6rem);
  font-weight: 800;
  color: var(--brown-dark);
  text-align: center;
  min-width: 80px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
  white-space: nowrap;
}

.ant-wrapper:hover .word-sign { transform: scale(1.05); border-color: var(--orange); }
.ant-wrapper.correct-hit .word-sign { background: #c8f7c5; border-color: var(--correct); }
.ant-wrapper.wrong-hit .word-sign { background: #fdd; border-color: var(--wrong); }

.ant-emoji {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  margin-top: 1px;
  transition: transform 0.2s;
}

.ant-wrapper.correct-hit .ant-emoji { transform: scale(1.2); }
.ant-wrapper.wrong-hit .ant-emoji { transform: scale(0.85); }

.mound {
  position: absolute;
  bottom: 0;
  width: 130%;
  height: 36px;
  background: radial-gradient(ellipse at 50% 80%, #a07830 0%, #7a5a20 50%, var(--brown-dark) 100%);
  border-radius: 50%;
  z-index: 2;
}

.mound::before {
  content: '';
  position: absolute;
  top: -4px;
  left: 8%;
  right: 8%;
  height: 10px;
  background: radial-gradient(ellipse, #6aaa3a 0%, #4a8a2a 100%);
  border-radius: 50%;
}

@keyframes celebrate {
  0%   { transform: translateY(0); }
  20%  { transform: translateY(-14px) rotate(-8deg); }
  40%  { transform: translateY(-6px) rotate(8deg); }
  60%  { transform: translateY(-10px) rotate(-4deg); }
  80%  { transform: translateY(-3px) rotate(4deg); }
  100% { transform: translateY(0) rotate(0); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  15% { transform: translateX(-8px) rotate(-3deg); }
  30% { transform: translateX(8px) rotate(3deg); }
  45% { transform: translateX(-6px) rotate(-2deg); }
  60% { transform: translateX(6px) rotate(2deg); }
  75% { transform: translateX(-3px); }
}

/* ===== Progress ===== */
.progress-bar {
  display: flex;
  gap: 5px;
  margin-top: 8px;
  z-index: 20;
}

.progress-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  border: 2px solid rgba(255,255,255,0.5);
  transition: background 0.3s, transform 0.3s;
}

.progress-dot.done { background: var(--correct); border-color: #fff; }
.progress-dot.wrong-dot { background: var(--wrong); border-color: #fff; }
.progress-dot.current { transform: scale(1.3); border-color: var(--gold); background: var(--gold); }

/* ===== Particles ===== */
.particle {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 1000;
  animation: particle-burst 0.7s ease-out forwards;
}

@keyframes particle-burst {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
}

/* ===== Overlay (instruction + transition) ===== */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
}

.overlay-box {
  background: white;
  border-radius: 24px;
  padding: 32px 40px;
  text-align: center;
  animation: pop-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: 88vw;
  width: 380px;
}

.overlay-box .ov-icon { font-size: 2.8rem; margin-bottom: 6px; }
.overlay-box .ov-title { font-size: 1.5rem; font-weight: 900; color: var(--brown-dark); }
.overlay-box .ov-stats { font-size: 1.05rem; color: #7a6530; margin: 10px 0; line-height: 1.7; }
.overlay-box .ov-stats b { color: var(--brown-dark); }
.overlay-box .ov-divider { border: none; border-top: 2px dashed #ddd; margin: 14px 0; }
.overlay-box .ov-next-label { font-size: 0.95rem; color: #aaa; }
.overlay-box .ov-next-title { font-size: 1.3rem; font-weight: 800; color: var(--orange); margin: 4px 0; }
.overlay-box .ov-next-desc { font-size: 0.95rem; color: #888; margin-bottom: 14px; }

.overlay-box .ov-btn {
  display: inline-block;
  background: linear-gradient(135deg, var(--orange), #f0850a);
  color: white;
  border: 3px solid var(--brown);
  border-radius: 16px;
  padding: 12px 36px;
  font-size: 1.2rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--brown-dark);
  transition: transform 0.1s, box-shadow 0.1s;
}

.overlay-box .ov-btn:active {
  transform: translateY(2px);
  box-shadow: 0 1px 0 var(--brown-dark);
}

@keyframes pop-in {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ===== Result Screen ===== */
#result-screen {
  gap: 16px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(6px);
}

.result-card {
  background: linear-gradient(135deg, #fffdf0, #fff3cc);
  border: 5px solid var(--brown);
  border-radius: 24px;
  padding: 24px 32px;
  text-align: center;
  width: min(92vw, 440px);
  box-shadow: 0 8px 0 var(--brown-dark);
  max-height: 85vh;
  overflow-y: auto;
}

.result-title { font-size: 1.8rem; font-weight: 900; color: var(--brown-dark); margin-bottom: 4px; }
.result-score { font-size: 3rem; font-weight: 900; color: var(--orange); margin: 6px 0; }
.result-stats { display: flex; justify-content: center; gap: 24px; margin: 10px 0; font-size: 1rem; color: #7a6530; }
.result-stats span { font-weight: 700; }
.result-message { font-size: 1.2rem; color: var(--brown-dark); margin: 10px 0; font-weight: 700; }

.level-breakdown {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 12px 0;
}

.level-breakdown-item {
  background: rgba(0,0,0,0.04);
  border: 2px solid rgba(0,0,0,0.08);
  border-radius: 14px;
  padding: 10px 16px;
  text-align: center;
  flex: 1;
  max-width: 120px;
}

.level-breakdown-item .lb-label {
  font-size: 0.8rem;
  color: #aaa;
  margin-bottom: 2px;
}

.level-breakdown-item .lb-score {
  font-size: 1.4rem;
  font-weight: 900;
  color: var(--brown-dark);
}

.level-breakdown-item .lb-detail {
  font-size: 0.8rem;
  color: #999;
}

.wrong-review {
  text-align: left;
  margin: 12px 0 8px;
  padding: 12px 16px;
  background: rgba(231, 76, 60, 0.08);
  border-radius: 12px;
  border: 2px solid rgba(231, 76, 60, 0.2);
}

.wrong-review h3 { font-size: 1rem; color: var(--wrong); margin-bottom: 8px; }
.wrong-review-item { font-size: 1rem; padding: 4px 0; color: #555; border-bottom: 1px solid rgba(0,0,0,0.06); }
.wrong-review-item:last-child { border-bottom: none; }
.wrong-review-item b { color: var(--brown-dark); }

.result-buttons {
  display: flex;
  gap: 12px;
  margin-top: 14px;
  justify-content: center;
}

.btn {
  padding: 12px 28px;
  border: 3px solid var(--brown);
  border-radius: 14px;
  font-size: 1.1rem;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  box-shadow: 0 3px 0 var(--brown-dark);
}

.btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--brown-dark); }
.btn-primary { background: linear-gradient(135deg, var(--orange), #f0850a); color: white; }
.btn-secondary { background: white; color: var(--brown-dark); }

/* ===== Screen Shake ===== */
.screen-shake { animation: screen-shake 0.3s ease-in-out; }

@keyframes screen-shake {
  0%, 100% { transform: translate(0); }
  20% { transform: translate(-4px, 2px); }
  40% { transform: translate(4px, -2px); }
  60% { transform: translate(-3px, -1px); }
  80% { transform: translate(3px, 1px); }
}

/* ===== Responsive ===== */
@media (max-height: 580px) {
  .top-bar { padding: 3px 10px; font-size: 0.8rem; }
  .hearts { font-size: 1rem; letter-spacing: 1px; }
  .prompt-area { margin-top: 2px; min-height: 44px; }
  .prompt-label { font-size: 0.75rem; margin-bottom: 0; }
  .prompt-word { font-size: 1.4rem; padding: 2px 14px; }
  .timer-bar-container { margin-top: 4px; height: 5px; }
  .holes-container { margin-top: 4px; gap: 4px 6px; }
  .hole { height: clamp(90px, 20vw, 130px); }
  .ant-wrapper { bottom: 26px; }
  .word-sign { padding: 4px 8px; min-height: 36px; font-size: clamp(0.95rem, 3vw, 1.2rem); }
  .ant-emoji { font-size: 1.3rem; }
  .mound { height: 28px; }
  .progress-bar { margin-top: 4px; }
  .progress-dot { width: 10px; height: 10px; }
}

@media (min-width: 700px) {
  .holes-container { gap: 12px 30px; }
  .word-sign { font-size: 1.5rem; padding: 10px 16px; min-width: 100px; }
}

/* ===== Leaderboard ===== */
.start-lb-btn {
  background: linear-gradient(135deg, #fff9e6, #fff3cc);
  border: 3px solid var(--brown);
  border-radius: 16px;
  padding: 12px 28px;
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--brown-dark);
  cursor: pointer;
  box-shadow: 0 3px 0 var(--brown-dark);
  transition: transform 0.12s, box-shadow 0.12s;
}
.start-lb-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 0 var(--brown-dark); }
.start-lb-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--brown-dark); }

.submit-block {
  margin: 12px 0;
  padding: 14px;
  background: rgba(0,0,0,0.05);
  border-radius: 14px;
  border: 2px solid rgba(0,0,0,0.08);
  text-align: left;
}
.submit-block h3 { font-size: 0.95rem; color: var(--orange); margin-bottom: 10px; font-weight: 800; }
.submit-row { display: flex; gap: 8px; }
.name-input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 12px;
  border: 2px solid var(--brown);
  background: #fff;
  color: var(--brown-dark);
  font-size: 1rem;
  font-family: inherit;
  outline: none;
}
.name-input:focus { border-color: var(--orange); }
.submit-btn {
  padding: 10px 20px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--orange), #f0850a);
  color: white;
  font-weight: 800;
  cursor: pointer;
  font-size: 1rem;
  white-space: nowrap;
}
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.submit-status { margin-top: 8px; font-size: 0.85rem; color: #888; min-height: 18px; }
.submit-status.ok { color: var(--correct); }
.submit-status.err { color: var(--wrong); }

.leaderboard-list {
  list-style: none;
  max-height: 50vh;
  overflow-y: auto;
  padding: 0;
  margin: 8px 0 0;
}
.leaderboard-list li {
  display: grid;
  grid-template-columns: 32px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 7px 10px;
  border-radius: 10px;
  font-size: 0.95rem;
}
.leaderboard-list li + li { margin-top: 2px; }
.leaderboard-list li:nth-child(odd) { background: rgba(0,0,0,0.04); }
.leaderboard-list li.is-self { background: rgba(255,152,0,0.12); border: 2px solid rgba(255,152,0,0.4); }
.leaderboard-list .lb-rank { font-weight: 800; color: var(--orange); text-align: center; }
.leaderboard-list li:nth-child(1) .lb-rank { color: #ffd700; }
.leaderboard-list li:nth-child(2) .lb-rank { color: #b0b0b0; }
.leaderboard-list li:nth-child(3) .lb-rank { color: #cd7f32; }
.leaderboard-list .lb-name { color: var(--brown-dark); font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.leaderboard-list .lb-meta { color: #999; font-size: 0.8rem; margin-left: 6px; font-weight: 400; }
.leaderboard-list .lb-score { font-weight: 800; color: var(--orange); }
.lb-empty { text-align: center; color: #aaa; font-size: 0.95rem; padding: 14px; }
</style>
</head>
<body>

<div class="cloud cloud-1"></div>
<div class="cloud cloud-2"></div>
<div class="cloud cloud-3"></div>

<!-- Start Screen -->
<div class="screen" id="start-screen">
  <div class="title"><span class="title-ant">🐜</span> 打螞蟻學單字</div>
  <div class="start-info">
    🌱 第一關：看中文找英文<br>
    🌿 第二關：更多選擇更快速<br>
    🌳 第三關：聽發音找中文
  </div>
  <button class="start-btn" onclick="startGame()">開始挑戰</button>
  <button class="start-lb-btn" onclick="Leaderboard.openTitleBoard()">🏆 排行榜</button>

<script>
const WORDS = [
  { en: 'ant', zh: '螞蟻' },
  { en: 'head', zh: '頭部' },
  { en: 'thorax', zh: '胸部' },
  { en: 'abdomen', zh: '腹部' },
  { en: 'legs', zh: '腳' },
  { en: 'antennae', zh: '觸角' },
  { en: 'anthill', zh: '蟻丘' },
  { en: 'outside', zh: '外面' },
  { en: 'inside', zh: '裡面' },
  { en: 'tiny', zh: '極小的' },
  { en: 'little', zh: '小的' },
  { en: 'under', zh: '在⋯下面' },
  { en: 'some', zh: '一些' },
  { en: 'they', zh: '他們' },
  { en: 'when', zh: '當⋯時候' }
];

const LEVELS = {
  1: { holes: 3, time: 3000, pool: WORDS.slice(0, 10), label: '第一關', icon: '🌱', desc: '看中文，點螞蟻找英文！', hint: '3 個選項，每題 3 秒' },
  2: { holes: 5, time: 4000, pool: [...WORDS],           label: '第二關', icon: '🌿', desc: '看中文，快速找英文！',     hint: '5 個選項，每題 4 秒' },
  3: { holes: 6, time: 3500, pool: [...WORDS],           label: '第三關', icon: '🌳', desc: '聽發音，點螞蟻找中文！', hint: '6 個選項，每題 3.5 秒' }
};

const Q_PER_LEVEL = 10;
const PARTICLE_COLORS = ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96E6A1','#FF9F43','#EE5A24'];

let game = {};
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(type) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    gain.gain.value = 0.18;
    const t = ctx.currentTime;
    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.08);
      osc.frequency.setValueAtTime(784, t + 0.16);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.35);
    } else if (type === 'wrong') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.setValueAtTime(150, t + 0.12);
      gain.gain.value = 0.1;
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t); osc.stop(t + 0.3);
    } else if (type === 'combo') {
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.06);
      osc.frequency.setValueAtTime(784, t + 0.12);
      osc.frequency.setValueAtTime(1047, t + 0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.start(t); osc.stop(t + 0.45);
    } else if (type === 'fanfare') {
      gain.gain.value = 0.15;
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.12);
      osc.frequency.setValueAtTime(784, t + 0.24);
      osc.frequency.setValueAtTime(1047, t + 0.36);
      gain.gain.setValueAtTime(0.15, t + 0.36);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc.start(t); osc.stop(t + 0.8);
    } else if (type === 'levelup') {
      gain.gain.value = 0.13;
      osc.frequency.setValueAtTime(392, t);
      osc.frequency.setValueAtTime(523, t + 0.1);
      osc.frequency.setValueAtTime(659, t + 0.2);
      osc.frequency.setValueAtTime(784, t + 0.3);
      gain.gain.setValueAtTime(0.13, t + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.start(t); osc.stop(t + 0.6);
    }
  } catch (e) {}
}

function speakWord(word) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.75;
  speechSynthesis.speak(u);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickRandom(arr, n, exclude) {
  const filtered = arr.filter(w => !exclude || !exclude.includes(w));
  return shuffle(filtered).slice(0, n);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function createParticles(x, y) {
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 10) * Math.PI * 2 + Math.random() * 0.5;
    const dist = 40 + Math.random() * 40;
    p.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
    p.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.background = PARTICLE_COLORS[i % PARTICLE_COLORS.length];
    p.style.width = (6 + Math.random() * 6) + 'px';
    p.style.height = p.style.width;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 700);
  }
}

function showScorePop(amount) {
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = (amount > 0 ? '+' : '') + amount;
  if (amount < 0) el.style.color = '#ff6b6b';
  document.querySelector('.score-display').appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function updateHearts() {
  document.getElementById('hearts').textContent = '❤️'.repeat(game.lives) + '🖤'.repeat(3 - game.lives);
}

function updateProgress() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  for (let i = 0; i < Q_PER_LEVEL; i++) {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    if (i < game.qIndex) {
      dot.classList.add(game.levelResults[i] ? 'done' : 'wrong-dot');
    } else if (i === game.qIndex) {
      dot.classList.add('current');
    }
    bar.appendChild(dot);
  }
}

function buildHoles() {
  const container = document.getElementById('holes-container');
  container.innerHTML = '';
  const n = LEVELS[game.level].holes;
  for (let i = 0; i < n; i++) {
    const hole = document.createElement('div');
    hole.className = 'hole';
    hole.innerHTML = `
      <div class="ant-wrapper" data-index="${i}">
        <div class="word-sign"></div>
        <div class="ant-emoji">🐜</div>
      </div>
      <div class="mound"></div>
    `;
    hole.querySelector('.ant-wrapper').addEventListener('click', function(e) {
      handleAntClick(parseInt(this.dataset.index), e);
    });
    container.appendChild(hole);
  }
}

function buildQuestionQueue(level) {
  const pool = LEVELS[level].pool;
  const queue = [];
  let remaining = shuffle(pool);
  while (queue.length < Q_PER_LEVEL) {
    if (remaining.length === 0) remaining = shuffle(pool);
    const candidate = remaining.shift();
    if (queue.length > 0 && queue[queue.length - 1].en === candidate.en) {
      if (remaining.length > 0) {
        remaining.push(candidate);
        continue;
      }
    }
    queue.push(candidate);
  }
  return queue;
}

/* ===== Game Flow ===== */

function startGame() {
  game = {
    level: 1,
    score: 0,
    combo: 0,
    maxCombo: 0,
    lives: 3,
    wrongAnswers: [],
    levelStats: [],
    // per-level state
    qIndex: 0,
    levelResults: [],
    questions: [],
    currentTarget: null,
    currentOptions: null,
    clickable: false,
    timerInterval: null,
  };
  showScreen('game-screen');
  startLevel(1);
}

function startLevel(level) {
  game.level = level;
  game.lives = 3;
  game.combo = 0;
  game.qIndex = 0;
  game.levelResults = [];
  game.questions = buildQuestionQueue(level);
  game.clickable = false;

  const cfg = LEVELS[level];
  document.getElementById('level-tag').textContent = `${cfg.icon} ${cfg.label}`;
  document.getElementById('score-num').textContent = game.score;
  document.getElementById('combo-display').classList.add('hidden');
  updateHearts();
  buildHoles();
  updateProgress();

  showInstructionOverlay(level, () => {
    setTimeout(() => nextQuestion(), 400);
  });
}

function showInstructionOverlay(level, cb) {
  const cfg = LEVELS[level];
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="overlay-box">
      <div class="ov-icon">${cfg.icon}</div>
      <div class="ov-title">${cfg.label}</div>
      <div class="ov-stats" style="margin-top:10px">${cfg.desc}</div>
      <div class="ov-next-desc">${cfg.hint}</div>
    </div>
  `;
  document.body.appendChild(overlay);
  setTimeout(() => { overlay.remove(); cb(); }, 2000);
}

function showLevelTransition(completedLevel) {
  playSound('levelup');
  const stats = game.levelStats[game.levelStats.length - 1];
  const nextLevel = completedLevel + 1;
  const nextCfg = LEVELS[nextLevel];

  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="overlay-box">
      <div class="ov-icon">${LEVELS[completedLevel].icon}</div>
      <div class="ov-title">${LEVELS[completedLevel].label} 完成！</div>
      <div class="ov-stats">答對 <b>${stats.correct}</b> / ${stats.total} 題</div>
      <hr class="ov-divider">
      <div class="ov-next-label">接下來</div>
      <div class="ov-next-title">${nextCfg.icon} ${nextCfg.label}</div>
      <div class="ov-next-desc">${nextCfg.desc}<br>${nextCfg.hint}</div>
      <button class="ov-btn" id="next-level-btn">開始下一關</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('next-level-btn').addEventListener('click', () => {
    overlay.remove();
    startLevel(nextLevel);
  });
}

/* ===== Question Loop ===== */

function nextQuestion() {
  if (game.qIndex >= Q_PER_LEVEL || game.lives <= 0) {
    endLevel();
    return;
  }

  const cfg = LEVELS[game.level];
  const target = game.questions[game.qIndex];
  game.currentTarget = target;
  game.clickable = false;

  document.getElementById('q-counter').textContent = `${game.qIndex + 1} / ${Q_PER_LEVEL}`;
  updateProgress();

  const promptArea = document.getElementById('prompt-area');
  if (game.level === 3) {
    promptArea.innerHTML = `
      <div class="prompt-label">聽發音，找中文</div>
      <div class="prompt-word">🔊</div>
    `;
    setTimeout(() => speakWord(target.en), 300);
  } else {
    promptArea.innerHTML = `
      <div class="prompt-label">找出這個單字的英文</div>
      <div class="prompt-word">${target.zh}</div>
    `;
  }

  const distractors = pickRandom(cfg.pool, cfg.holes - 1, [target]);
  let options;
  let attempts = 0;
  do {
    options = shuffle([target, ...distractors]);
    attempts++;
  } while (
    attempts < 20 &&
    game.lastCorrectIndex !== undefined &&
    options[game.lastCorrectIndex] &&
    options[game.lastCorrectIndex].en === target.en
  );
  game.currentOptions = options;

  const ants = document.querySelectorAll('.ant-wrapper');
  ants.forEach((ant, i) => {
    ant.classList.remove('show', 'correct-hit', 'wrong-hit');
    ant.querySelector('.word-sign').textContent = game.level === 3 ? options[i].en + ' ' + options[i].zh : options[i].en;
  });

  setTimeout(() => {
    ants.forEach(ant => ant.classList.add('show'));
    game.clickable = true;
    startTimer(cfg.time);
  }, 200);
}

function startTimer(duration) {
  const bar = document.getElementById('timer-bar');
  bar.style.transition = 'none';
  bar.style.width = '100%';
  bar.style.backgroundColor = 'var(--correct)';
  bar.offsetHeight;

  game.timerStart = Date.now();
  clearInterval(game.timerInterval);
  game.timerInterval = setInterval(() => {
    const elapsed = Date.now() - game.timerStart;
    const pct = Math.max(0, 1 - elapsed / duration) * 100;
    bar.style.transition = 'width 0.1s linear, background-color 0.3s';
    bar.style.width = pct + '%';
    if (pct < 25) bar.style.backgroundColor = 'var(--wrong)';
    else if (pct < 50) bar.style.backgroundColor = 'var(--orange)';
    if (elapsed >= duration) {
      clearInterval(game.timerInterval);
      handleTimeout();
    }
  }, 50);
}

function handleTimeout() {
  if (!game.clickable) return;
  game.clickable = false;
  game.combo = 0;
  game.lastCorrectIndex = game.currentOptions.findIndex(w => w.en === game.currentTarget.en);
  document.getElementById('combo-display').classList.add('hidden');
  game.levelResults.push(false);
  game.wrongAnswers.push(game.currentTarget);

  document.querySelectorAll('.ant-wrapper').forEach(ant => ant.classList.remove('show'));
  game.qIndex++;
  setTimeout(() => nextQuestion(), 600);
}

function handleAntClick(index, event) {
  if (!game.clickable) return;
  game.clickable = false;
  clearInterval(game.timerInterval);

  const clickedWord = game.currentOptions[index];
  const correct = clickedWord.en === game.currentTarget.en;
  game.lastCorrectIndex = game.currentOptions.findIndex(w => w.en === game.currentTarget.en);
  const ants = document.querySelectorAll('.ant-wrapper');
  const clickedAnt = ants[index];

  if (correct) {
    playSound('correct');
    clickedAnt.classList.add('correct-hit');
    createParticles(event.clientX, event.clientY);

    game.combo++;
    if (game.combo > game.maxCombo) game.maxCombo = game.combo;

    let points = 10;
    if (game.combo >= 10) points += 20;
    else if (game.combo >= 5) points += 10;
    else if (game.combo >= 3) points += 5;

    game.score += points;
    document.getElementById('score-num').textContent = game.score;
    showScorePop(points);

    const comboEl = document.getElementById('combo-display');
    if (game.combo >= 3) {
      comboEl.classList.remove('hidden');
      comboEl.textContent = `🔥 COMBO x${game.combo}!`;
      if (game.combo === 3 || game.combo === 5 || game.combo === 10) playSound('combo');
    }

    game.levelResults.push(true);
  } else {
    playSound('wrong');
    clickedAnt.classList.add('wrong-hit');

    ants.forEach((ant, i) => {
      if (game.currentOptions[i].en === game.currentTarget.en) {
        ant.querySelector('.word-sign').style.background = '#c8f7c5';
        ant.querySelector('.word-sign').style.borderColor = 'var(--correct)';
      }
    });

    document.getElementById('game-screen').classList.add('screen-shake');
    setTimeout(() => document.getElementById('game-screen').classList.remove('screen-shake'), 300);

    game.lives--;
    updateHearts();
    game.combo = 0;
    document.getElementById('combo-display').classList.add('hidden');
    game.score = Math.max(0, game.score - 5);
    document.getElementById('score-num').textContent = game.score;
    showScorePop(-5);

    game.wrongAnswers.push(game.currentTarget);
    game.levelResults.push(false);
  }

  game.qIndex++;

  setTimeout(() => {
    ants.forEach(ant => {
      ant.classList.remove('show', 'correct-hit', 'wrong-hit');
      ant.querySelector('.word-sign').style.background = '';
      ant.querySelector('.word-sign').style.borderColor = '';
    });
    setTimeout(() => nextQuestion(), 350);
  }, correct ? 600 : 1200);
}

/* ===== End Level / End Game ===== */

function endLevel() {
  clearInterval(game.timerInterval);

  const correct = game.levelResults.filter(r => r).length;
  game.levelStats.push({ level: game.level, correct, total: Q_PER_LEVEL });

  if (game.level < 3) {
    showLevelTransition(game.level);
  } else {
    showFinalResults();
  }
}

function showFinalResults() {
  playSound('fanfare');

  const totalCorrect = game.levelStats.reduce((s, l) => s + l.correct, 0);
  const totalQ = game.levelStats.reduce((s, l) => s + l.total, 0);
  const pct = Math.round((totalCorrect / totalQ) * 100);
  game.lastAccuracy = pct;

  let msg, emoji;
  if (pct === 100) { msg = '太厲害了！三關全部答對！'; emoji = '🏆'; }
  else if (pct >= 80) { msg = '非常棒！你是單字高手！'; emoji = '🌟'; }
  else if (pct >= 60) { msg = '不錯喔！再練習會更好！'; emoji = '💪'; }
  else { msg = '加油！多練幾次就會進步！'; emoji = '📚'; }

  const icons = ['🌱','🌿','🌳'];
  const breakdownHtml = game.levelStats.map((s, i) => `
    <div class="level-breakdown-item">
      <div class="lb-label">${icons[i]} ${LEVELS[s.level].label}</div>
      <div class="lb-score">${s.correct}/${s.total}</div>
    </div>
  `).join('');

  let wrongHtml = '';
  if (game.wrongAnswers.length > 0) {
    const unique = [...new Map(game.wrongAnswers.map(w => [w.en, w])).values()];
    wrongHtml = `
      <div class="wrong-review">
        <h3>📝 需要複習的單字</h3>
        ${unique.map(w => `<div class="wrong-review-item"><b>${w.en}</b> — ${w.zh}</div>`).join('')}
      </div>
    `;
  }

  const savedName = Leaderboard.getSavedName();

  document.getElementById('result-card').innerHTML = `
    <div class="result-title">${emoji} 三關挑戰完成！</div>
    <div class="result-score">${game.score} 分</div>
    <div class="result-stats">
      <div>總答對 <span style="color:var(--correct)">${totalCorrect}</span> / ${totalQ}</div>
      <div>最高連續 <span style="color:var(--orange)">${game.maxCombo}</span></div>
    </div>
    <div class="level-breakdown">${breakdownHtml}</div>
    <div class="result-message">${msg}</div>
    ${wrongHtml}
    <div class="submit-block" id="submitBlock">
      <h3>🏆 上傳成績到排行榜</h3>
      <div class="submit-row">
        <input class="name-input" id="nameInput" type="text" maxlength="12"
               placeholder="輸入名字（最多 12 字）" autocomplete="off" value="${savedName}" />
        <button class="submit-btn" id="submitScoreBtn">上傳</button>
      </div>
      <p class="submit-status" id="submitStatus"></p>
    </div>
    <div class="submit-block hidden" id="boardBlock">
      <h3>🥇 排行榜 全部紀錄</h3>
      <ul class="leaderboard-list" id="resultLbList">
        <li class="lb-empty">上傳後會顯示排行榜</li>
      </ul>
    </div>
    <div class="result-buttons">
      <button class="btn btn-primary" onclick="startGame()">🔄 再玩一次</button>
    </div>
  `;

  document.getElementById('submitScoreBtn').addEventListener('click', () => Leaderboard.submit());
  document.getElementById('nameInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') Leaderboard.submit(); });

  showScreen('result-screen');
}

/* ===== Leaderboard ===== */
const LEADERBOARD_API = "https://class-leaderboard.advposys.workers.dev";
const GAME_ID = "w15-whack-ant";

const Leaderboard = (() => {
  const NAME_KEY = "whackAnt.lastName";
  let submitting = false;
  let lastSubmission = null;

  function getSavedName() {
    try { return localStorage.getItem(NAME_KEY) || ''; } catch (_) { return ''; }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c]));
  }

  function setStatus(text, kind) {
    const el = document.getElementById('submitStatus');
    if (!el) return;
    el.textContent = text || '';
    el.className = 'submit-status' + (kind ? ' ' + kind : '');
  }

  async function submit() {
    if (submitting) return;
    const nameInput = document.getElementById('nameInput');
    const submitBtn = document.getElementById('submitScoreBtn');
    const name = (nameInput.value || '').trim();

    if (!name) { setStatus('請先輸入名字', 'err'); nameInput.focus(); return; }
    if ([...name].length > 12) { setStatus('名字最多 12 字', 'err'); return; }

    try { localStorage.setItem(NAME_KEY, name); } catch (_) {}

    submitBtn.disabled = true;
    submitBtn.textContent = '上傳中…';
    setStatus('傳送中…');
    submitting = true;

    const payload = {
      game_id: GAME_ID,
      mode: 'three-levels',
      player_name: name,
      score: game.score,
      accuracy: game.lastAccuracy,
      max_combo: game.maxCombo
    };

    try {
      const res = await fetch(LEADERBOARD_API + '/api/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) {
        const code = (data && data.error) || ('HTTP ' + res.status);
        const friendly = code === 'RATE_LIMITED_MINUTE' ? '上傳太頻繁，請等 1 分鐘再試'
                       : code === 'RATE_LIMITED_HOUR' ? '你已上傳很多次了，請晚一點再試'
                       : code === 'BAD_NAME' ? '名字無效'
                       : '上傳失敗：' + code;
        setStatus(friendly, 'err');
        submitBtn.disabled = false;
        submitBtn.textContent = '重試';
        return;
      }
      lastSubmission = { id: data.id, rank: data.rank, total: data.total };
      setStatus('已上傳！你是第 ' + data.rank + ' 名（共 ' + data.total + ' 人）', 'ok');
      submitBtn.textContent = '已上傳';
      submitBtn.disabled = true;
      await loadBoard('resultLbList', 'boardBlock');
    } catch (err) {
      setStatus('連線失敗，請檢查網路後重試', 'err');
      submitBtn.disabled = false;
      submitBtn.textContent = '重試';
    } finally {
      submitting = false;
    }
  }

  async function loadBoard(listId, blockId) {
    const list = document.getElementById(listId);
    const block = blockId ? document.getElementById(blockId) : null;
    if (block) block.classList.remove('hidden');
    if (!list) return;
    list.innerHTML = '<li class="lb-empty">載入中…</li>';
    try {
      const url = LEADERBOARD_API + '/api/leaderboard?game_id=' + encodeURIComponent(GAME_ID) + '&mode=three-levels&limit=100';
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok || !Array.isArray(data.entries)) {
        list.innerHTML = '<li class="lb-empty">排行榜載入失敗</li>';
        return;
      }
      if (data.entries.length === 0) {
        list.innerHTML = '<li class="lb-empty">還沒有人上榜，你是第一個！</li>';
        return;
      }
      list.innerHTML = data.entries.map(e => {
        const isSelf = lastSubmission && e.id === lastSubmission.id;
        const acc = e.accuracy != null ? e.accuracy + '%' : '';
        const combo = e.max_combo != null ? '連續×' + e.max_combo : '';
        const meta = (acc || combo) ? '<span class="lb-meta">' + acc + ' ' + combo + '</span>' : '';
        return '<li class="' + (isSelf ? 'is-self' : '') + '">' +
          '<span class="lb-rank">' + e.rank + '</span>' +
          '<span class="lb-name">' + escapeHtml(e.player_name) + meta + '</span>' +
          '<span class="lb-score">' + e.score + '</span></li>';
      }).join('');
    } catch (err) {
      list.innerHTML = '<li class="lb-empty">排行榜載入失敗（網路問題）</li>';
    }
  }

  function openTitleBoard() {
    showScreen('leaderboard-screen');
    loadBoard('title-lb-list', null);
  }

  return { submit, loadBoard, openTitleBoard, getSavedName };
})();
</script>
